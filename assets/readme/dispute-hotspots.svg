<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Scopeguard dispute hotspots</title>
  <desc id="desc">A map of common software outsourcing dispute points and the documents that reduce them.</desc>
  <rect width="1200" height="640" fill="#F7F9FC"/>
  <rect x="48" y="44" width="1104" height="552" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="88" y="96" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17365D">분쟁이 커지는 지점</text>
  <text x="88" y="132" font-family="Arial, sans-serif" font-size="18" fill="#52616F">계약서 한 장보다, 운영 중 생기는 요청을 어느 문서로 받을지가 더 중요합니다.</text>

  <g transform="translate(86 178)">
    <rect width="316" height="132" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#92400E">착수자료 미확정</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">PRD, 화면, 데이터, 검수 기준 없이</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">착수하면 일정과 범위가 같이 흔들림</text>
  </g>

  <g transform="translate(442 178)">
    <rect width="316" height="132" rx="14" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#155E75">검수 기준 부재</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">완료 조건과 테스트 조건이 없으면</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">납품 후에도 끝났는지 다툼</text>
  </g>

  <g transform="translate(798 178)">
    <rect width="316" height="132" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">수정과 변경요청 혼재</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">문구 수정, UX 변경, 신규 기능이</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">한 요청서 안에 섞이면 비용 분쟁</text>
  </g>

  <g transform="translate(86 350)">
    <rect width="316" height="132" rx="14" fill="#FDF2F8" stroke="#DB2777" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#9D174D">회의록 없는 구두요청</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">말로 한 요청이 계약 범위처럼</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">주장되면 사실관계부터 흔들림</text>
  </g>

  <g transform="translate(442 350)">
    <rect width="316" height="132" rx="14" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3730A3">권리와 NDA 경계</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">소스코드, 사전보유자산, 피드백,</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">비밀정보 사용 범위가 뒤늦게 문제됨</text>
  </g>

  <g transform="translate(798 350)">
    <rect width="316" height="132" rx="14" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155">운영비와 계정 인수</text>
    <text x="24" y="72" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">API, 모델, 도메인, 계정 권한이</text>
    <text x="24" y="98" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">납품 후 비용과 책임으로 남음</text>
  </g>

  <line x1="244" y1="524" x2="956" y2="524" stroke="#CBD5E1" stroke-width="3"/>
  <text x="348" y="558" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#17365D">Scopeguard는 이 지점들을 DOCX 조항과 XLSX 체크표로 나눠 잠급니다.</text>
</svg>
