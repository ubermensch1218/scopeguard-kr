<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Scopeguard document flow</title>
  <desc id="desc">A flow from contract inputs to DOCX and XLSX outputs and lawyer feedback.</desc>
  <rect width="1200" height="520" fill="#FAFAFA"/>
  <text x="68" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17365D">입력값이 문서 패키지로 바뀌는 흐름</text>
  <text x="68" y="108" font-family="Arial, sans-serif" font-size="18" fill="#52616F">견적 row와 검수 기준을 중심에 두고, 계약서 본문과 운영용 표를 함께 만듭니다.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <g transform="translate(72 166)">
    <rect width="230" height="176" rx="16" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155">입력</text>
    <text x="24" y="78" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">견적 row</text>
    <text x="24" y="106" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">요구사항 ID</text>
    <text x="24" y="134" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">완료 조건 / 테스트 조건</text>
  </g>

  <line x1="322" y1="254" x2="418" y2="254" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(438 166)">
    <rect width="324" height="176" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1D4ED8">계약 기준 생성</text>
    <text x="24" y="78" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">계약서 초안</text>
    <text x="24" y="106" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">RFP / 검수기준표</text>
    <text x="24" y="134" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">변경요청 / 수정요청 / 하자신고</text>
  </g>

  <line x1="782" y1="254" x2="878" y2="254" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(898 166)">
    <rect width="230" height="176" rx="16" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
    <text x="24" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">전달 패키지</text>
    <text x="24" y="78" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">DOCX 문서</text>
    <text x="24" y="106" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">XLSX 체크표</text>
    <text x="24" y="134" font-family="Arial, sans-serif" font-size="17" fill="#3F3F46">ZIP 묶음</text>
  </g>

  <path d="M1013 362 C1008 438, 686 456, 600 364" fill="none" stroke="#F59E0B" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="414" y="382" width="378" height="70" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="448" y="426" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400E">변호사 검토 결과는 21번 XLSX로 회수</text>
</svg>
